name: Node.js CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:
    branches:
      - "main"

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm ci --include=optional --workspace frontend

      - name: Coherence check (typecheck)
        run: npm run typecheck --workspace backend --if-present

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Security audit
        run: npm run audit

      - name: Build
        run: npm run build
