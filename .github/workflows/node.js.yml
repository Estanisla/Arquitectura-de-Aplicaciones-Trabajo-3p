name: Node.js CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:
    branches:
      - "main"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      # 1) Environment prepared
      - name: Install dependencies
        run: npm install

      # 2) Code coherence
      - name: Coherence check (typecheck)
        run: npm run typecheck --workspace backend --if-present

      # 3) Code style/order
      - name: Lint
        run: npm run lint

      # 4) System tests
      - name: Tests
        run: npm test

      # 5) Security analysis
      - name: Security audit
        run: npm run audit

      # 6) Final build
      - name: Build
        run: npm run build
